<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jianna's 1st Birthday | Neumorphic Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Noto+Sans+Tamil:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e0e5ec;
            --text: #3e4a59;
            --gold: #d4af37;
            /* Neumorphic Shadow Colors */
            --shadow-light: rgba(255, 255, 255, 0.7);
            --shadow-dark: rgba(163, 177, 198, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Modern Gradient Neumorphic Background */
            background: linear-gradient(135deg, #e0e5ec 0%, #d1d9e6 100%);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            color: var(--text);
            padding: 20px;
        }

        /* Neumorphic Element Styling */
        .neumorphic {
            background: var(--bg);
            border-radius: 40px;
            box-shadow: 10px 10px 20px var(--shadow-dark),
                       -10px -10px 20px var(--shadow-light);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s ease;
        }

        /* Card Styling */
        .card {
            width: 90%;
            max-width: 440px;
            padding: 50px 30px;
            text-align: center;
            position: relative;
            animation: cardEntrance 1s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* New Bible Verse (Tamil) */
        .bible-verse {
            font-family: 'Noto Sans Tamil', sans-serif;
            color: #5c6b7f;
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 30px;
            font-style: italic;
        }

        .name {
            font-family: 'Great Vibes', cursive;
            font-size: 4.8rem;
            color: var(--gold);
            margin: 0px 0 10px;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }

        .turning-one {
            font-family: 'Cinzel', serif;
            letter-spacing: 5px;
            font-size: 1rem;
            color: #444;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Neumorphic Countdown Grid */
        #countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 30px 0;
        }

        .time-box {
            padding: 15px 5px;
            border-radius: 20px;
            /* Extruded Neumorphic style for boxes */
            box-shadow: inset 4px 4px 8px var(--shadow-dark),
                        inset -4px -4px 8px var(--shadow-light);
        }

        .time-num { display: block; font-size: 1.7rem; font-weight: 700; color: var(--gold); }
        .time-label { font-size: 0.6rem; color: #7f8c9f; text-transform: uppercase; font-weight: 600; letter-spacing: 1px;}

        .details {
            border-top: 2px dashed rgba(212, 175, 55, 0.2);
            border-bottom: 2px dashed rgba(212, 175, 55, 0.2);
            padding: 25px 0;
            margin: 30px 0 25px;
            line-height: 1.8;
        }

        .venue {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.25rem;
            display: block;
            margin-top: 8px;
            color: #222;
        }

        /* Neumorphic Button Style */
        .btn-map {
            padding: 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            display: block;
            color: white;
            background: linear-gradient(135deg, var(--gold) 0%, #b8860b 100%);
            box-shadow: 6px 6px 12px var(--shadow-dark),
                       -6px -6px 12px var(--shadow-light);
            border: none;
            cursor: pointer;
            width: 100%;
            transition: 0.3s ease;
        }

        .btn-map:hover {
            box-shadow: 2px 2px 5px var(--shadow-dark),
                        -2px -2px 5px var(--shadow-light);
            transform: translateY(2px);
        }
        
        .footer-dots { color: rgba(212, 175, 55, 0.4); margin-top: 30px; letter-spacing: 8px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="card neumorphic">
        <div class="bible-verse">
            "நன்மையினால் உன் வாயைத் திருப்தியாக்குகிறார்;<br>
            கழுகுக்குச் சமானமாய் உன் வயது<br>
            திரும்ப வாலவயதுபோலாகிறது."<br>
            <strong>— சங்கீதம் 103:5</strong>
        </div>

        <div class="name">Jianna</div>
        <div class="turning-one">is turning one</div>

        <div id="countdown">
            <div class="time-box"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
            <div class="time-box"><span class="time-num" id="hours">00</span><span class="time-label">Hrs</span></div>
            <div class="time-box"><span class="time-num" id="minutes">00</span><span class="time-label">Mins</span></div>
            <div class="time-box"><span class="time-num" id="seconds">00</span><span class="time-label">Secs</span></div>
        </div>

        <div class="details">
            <p style="color: #b8860b; font-weight: 700; font-size: 0.95rem;">FRIDAY, APRIL 24 @ 6:30 PM</p>
            <span class="venue">S.S. CONVENTION HALL</span>
            <p style="font-size: 0.8rem; opacity: 0.9; color: #5c6b7f;">Ponmeni, Madurai - 625016</p>
        </div>

        <a href="http://googleusercontent.com/maps.google.com/5" target="_blank" class="btn-map">📍 NAVIGATE TO VENUE</a>

        <div class="footer-dots">✦ ✦ ✦</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // Confetti Effect on Load
        window.onload = function() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#d4af37', '#ffffff', '#a3b1c6']
            });
        };

        // Countdown Logic
        const targetDate = new Date("April 24, 2026 18:30:00").getTime();

        function countdownUpdate() {
            const now = new Date().getTime();
            const gap = targetDate - now;

            const d = Math.floor(gap / (1000 * 60 * 60 * 24));
            const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;

            if (gap < 0) {
                document.getElementById("countdown").innerHTML = "<div style='color:var(--gold); font-weight:700; letter-spacing:2px;'>THE PARTY HAS BEGUN!</div>";
            }
        }
        setInterval(countdownUpdate, 1000);
        countdownUpdate();
    </script>
</body>
</html>
