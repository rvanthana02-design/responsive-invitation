<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jianna's 1st Birthday</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5dc; 
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #ffffff;
            width: 90%;
            max-width: 420px;
            padding: 40px 25px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            border: 6px double #d4af37; 
            margin: 20px;
        }
        .bible-verse {
            color: #8b7355;
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 20px;
            font-style: italic;
        }
        .name { font-size: 3.5rem; color: #d4af37; margin: 10px 0; font-family: 'Times New Roman', serif; font-style: italic; }
        .age { font-size: 1.2rem; color: #555; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }
        
        /* Countdown Styling */
        #countdown {
            display: flex;
            justify-content: space-around;
            background: #fffdfa;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid #f0e6d2;
        }
        .time-box { text-align: center; }
        .time-num { display: block; font-size: 1.5rem; font-weight: bold; color: #d4af37; }
        .time-label { font-size: 0.7rem; color: #8b7355; text-transform: uppercase; }

        .details-section {
            border-top: 1px solid #f0e6d2;
            border-bottom: 1px solid #f0e6d2;
            padding: 20px 0;
            margin-bottom: 20px;
            color: #444;
            line-height: 1.6;
        }
        .venue-name { font-weight: bold; color: #222; font-size: 1.1rem; display: block; margin-top: 5px; }

        .map-button {
            display: inline-block;
            background-color: #d4af37;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="bible-verse">
        "கர்த்தர் உனக்கு ஆசிர்வாதம் தந்து, உன்னைப் பாதுகாப்பாராக."<br>
        "The Lord bless you and keep you."<br>
        <strong>— Numbers 6:24</strong>
    </div>

    <div class="name">Jianna</div>
    <div class="age">is turning ONE</div>

    <div id="countdown">
        <div class="time-box"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
        <div class="time-box"><span class="time-num" id="hours">00</span><span class="time-label">Hours</span></div>
        <div class="time-box"><span class="time-num" id="minutes">00</span><span class="time-label">Mins</span></div>
    </div>

    <div class="details-section">
        <strong>FRIDAY, APRIL 24 @ 6:30 PM</strong>
        <span class="venue-name">S.S. CONVENTION HALL</span>
        <small>Back side of Sri Krishna Sweets, Ponmeni, Madurai</small>
    </div>

    <a href="https://share.google/bUPpBY8HVZt4nqpt2" target="_blank" class="map-button">
        📍 NAVIGATE TO VENUE
    </a>
</div>

<script>
    // Set the target date: April 24, 2026 18:30:00
    const targetDate = new Date("April 24, 2026 18:30:00").getTime();

    const timer = setInterval(function() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

        document.getElementById("days").innerHTML = days;
        document.getElementById("hours").innerHTML = hours;
        document.getElementById("minutes").innerHTML = minutes;

        if (distance < 0) {
            clearInterval(timer);
            document.getElementById("countdown").innerHTML = "<div style='color:#d4af37; font-weight:bold;'>THE CELEBRATION HAS BEGUN!</div>";
        }
    }, 1000);
</script>

</body>
</html>
