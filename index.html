<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jianna Turns One</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ffd6e8,#fff0f5);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Card */
.card{
  background:#fff;
  border-radius:25px;
  padding:20px;
  width:90%;
  max-width:420px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
  border:5px solid #f7c6d9;
}

/* Cross */
.cross{
  font-size:30px;
  color:gold;
  animation:float 3s infinite,glow 2s infinite alternate;
}

/* Crown */
.crown{
  font-size:40px;
  animation:float 2s infinite;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
  100%{transform:translateY(0)}
}

@keyframes glow{
  from{text-shadow:0 0 5px gold}
  to{text-shadow:0 0 20px gold}
}

/* Photo */
.photo{
  width:110px;height:110px;
  border-radius:50%;
  border:3px solid gold;
  object-fit:cover;
  margin:10px auto;
}

/* Text */
.title{font-family:'Playfair Display';color:#d4af37;}
.name{font-size:28px;color:#ff4f81;font-weight:bold;}
.text{font-size:14px;color:#555;margin:8px 0;}
.highlight{color:#d4af37;font-weight:bold;}

/* Buttons */
.map-btn,.music-btn,.cut-btn{
  margin-top:10px;
  padding:10px 15px;
  border-radius:20px;
  border:none;
  background:linear-gradient(45deg,#d4af37,#ffd700);
  color:white;
  cursor:pointer;
  display:inline-block;
  text-decoration:none;
}

/* Countdown */
.countdown{font-weight:bold;color:#d4af37;margin-top:10px;}

/* Cake */
.cake{font-size:50px;transition:0.5s;}
.cake.cut{transform:rotate(-10deg) scale(0.9);}

/* Bible */
.bible{margin-top:15px;font-style:italic;font-size:13px;}
.bible span{color:#d4af37;font-weight:bold;}

/* Fireworks */
#fireworks{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
}

/* Location Pin */
.location-pin{
  font-size:35px;
  animation:bounce 1.5s infinite,glowPin 2s infinite alternate;
}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
@keyframes glowPin{
  from{text-shadow:0 0 5px #ff4f81}
  to{text-shadow:0 0 20px #ff85a2}
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="card">

<div class="cross">✝️</div>
<div class="crown">👑</div>

<img src="your-baby-photo.jpg" class="photo">

<div class="title">Royal Birthday Celebration</div>

<div class="name">
👑 Jianna 👑<br>
<span style="font-size:16px;">Turns ONE | 1வது பிறந்தநாள்</span>
</div>

<div class="text">
With God’s grace and abundant love,<br>
இறைவனின் அருளாலும் அளவற்ற அன்பாலும்
</div>

<div class="text">
📅 April 24, Friday | ஏப்ரல் 24, வெள்ளி<br>
⏰ 6:30 PM | மாலை 6:30 மணி
</div>

<div class="location-pin">📍</div>

<div class="text">
S.S Convention Hall,<br>
Ponmeni, Madurai - 16
</div>

<a href="https://share.google/cxDQMwlbSag01pnN2"
target="_blank" class="map-btn">📍 View Location</a>

<div id="countdown" class="countdown"></div>

<!-- Cake -->
<div class="cake">🎂</div>
<button onclick="cutCake()" class="cut-btn">🎉 Cut Cake</button>

<!-- Bible -->
<div id="verseBox" class="bible"></div>
</div>

<script>
// Countdown
const eventDate=new Date("April 24, 2026 18:30:00").getTime();
setInterval(()=>{
 let d=eventDate-new Date().getTime();
 document.getElementById("countdown").innerHTML=
 "⏳ "+Math.floor(d/86400000)+"d "+
 Math.floor(d%86400000/3600000)+"h "+
 Math.floor(d%3600000/60000)+"m";
},1000);

// Cake
function cutCake(){
 document.querySelector('.cake').classList.add('cut');
 alert("🎉 Happy Birthday Jianna 🎂👑");
}
}

// Bible rotation
const verses=[
["Children are a gift from the Lord","பிள்ளைகள் கர்த்தரால் தரப்படும் சுதந்தரம்","Psalm 127:3"],
["The Lord bless you and keep you","கர்த்தர் உன்னை ஆசீர்வதிப்பாராக","Numbers 6:24"],
["Before I formed you I knew you","நான் உன்னை முன்பே அறிந்தேன்","Jeremiah 1:5"]
];
let i=0;
setInterval(()=>{
 document.getElementById("verseBox").innerHTML=
 verses[i][0]+"<br>"+verses[i][1]+"<span>"+verses[i][2]+"</span>";
 i=(i+1)%verses.length;
},4000);

// Fireworks
const c=document.getElementById("fireworks");
const ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let p=[];
function fire(){
 for(let i=0;i<30;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height,dx:(Math.random()-0.5)*5,dy:(Math.random()-0.5)*5,l:100});
 }
}
function draw(){
 ctx.fillStyle="rgba(0,0,0,0.1)";
 ctx.fillRect(0,0,c.width,c.height);
 p.forEach((e,i)=>{
  e.x+=e.dx;e.y+=e.dy;e.l--;
  ctx.fillStyle="gold";
  ctx.fillRect(e.x,e.y,2,2);
  if(e.l<=0)p.splice(i,1);
 });
 if(Math.random()<0.05)fire();
 requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
