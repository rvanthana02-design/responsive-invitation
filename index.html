<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jianna Turns One</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Fredoka',sans-serif;
  overflow:hidden;
  background:linear-gradient(135deg,#fff0f5,#e0f7fa,#fff9c4);
}

/* Swipe pages */
.container{
  display:flex;
  width:200%;
  transition:0.5s;
}
.page{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* Intro */
.intro{
  font-size:30px;
  text-align:center;
  animation:fadeIn 2s;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

/* Card */
.card{
  background:white;
  border-radius:25px;
  padding:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* Cute elements */
.name{font-size:28px;color:#ff69b4;}
.text{font-size:14px;margin:8px;}
.btn{
  background:#ff80ab;
  color:white;
  padding:10px;
  border:none;
  border-radius:20px;
}

/* Hearts */
.hearts span{
  position:fixed;
  bottom:0;
  animation:float 8s infinite;
}
@keyframes float{
  100%{transform:translateY(-100vh)}
}

/* Balloons */
.balloons span{
  position:fixed;
  bottom:-50px;
  animation:balloon 10s infinite;
}
@keyframes balloon{
  100%{transform:translateY(-120vh)}
}

/* Teddy */
.teddy{
  font-size:40px;
  animation:shake 2s infinite;
}
@keyframes shake{
  50%{transform:rotate(10deg)}
}

/* Sparkle */
.sparkle{
  position:fixed;
  width:100%;
  animation:spark 6s infinite;
}
@keyframes spark{
  100%{transform:translateY(100vh)}
}
</style>
</head>

<body>

<div class="container" id="container">

<!-- PAGE 1 INTRO -->
<div class="page">
<div class="intro">
🎉 Welcome 🎉<br>
Baby Jianna Turns ONE 👶💖
</div>
</div>

<!-- PAGE 2 MAIN -->
<div class="page">

<div class="card">

<div class="teddy">🧸</div>

<div class="name">Jianna 👶💖</div>

<div class="text">
📅 April 24 | ⏰ 6:30 PM
</div>

<div class="text">
📍 Ponmeni, Madurai
</div>

<button onclick="nextPage()" class="btn">Enter 🎈</button>

<div class="text">⏳ <span id="countdown"></span></div>

<button onclick="cutCake()" class="btn">🎂 Cut Cake</button>

<div>👀 <span id="visit"></span></div>

<input id="name" placeholder="Your Name"><br>
<button onclick="rsvp()" class="btn">RSVP 💌</button>

</div>

</div>

</div>

<!-- Hearts -->
<div class="hearts">
<span>💖</span><span>💕</span>
</div>

<!-- Balloons -->
<div class="balloons">
<span>🎈</span><span>🎈</span>
</div>

<!-- Sparkle -->
<div class="sparkle">✨✨✨✨</div>

<audio id="sound">
<source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<script>
// Swipe
function nextPage(){
 document.getElementById("container").style.transform="translateX(-100%)";
 document.getElementById("sound").play();
}

// Countdown
const d=new Date("April 24, 2026 18:30:00").getTime();
setInterval(()=>{
 let t=d-new Date().getTime();
 document.getElementById("countdown").innerHTML=
 Math.floor(t/86400000)+"d "+
 Math.floor(t%86400000/3600000)+"h";
},1000);

// Cake confetti
function cutCake(){
 for(let i=0;i<30;i++){
  let c=document.createElement("div");
  c.innerHTML="🎉";
  c.style.position="fixed";
  c.style.left=Math.random()*100+"vw";
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),2000);
 }
 document.getElementById("sound").play();
}

// Counter
let c=localStorage.getItem("v")||0;
c++; localStorage.setItem("v",c);
document.getElementById("visit").innerText=c;

// RSVP
function rsvp(){
 let name=document.getElementById("name").value;
 window.open("https://wa.me/91XXXXXXXXXX?text=I am "+name);
}
</script>

</body>
</html>
