<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jianna's 1st Birthday | Elite Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Cinzel:wght@400;700&family=Noto+Sans+Tamil:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #b8860b;
            --glass: rgba(255, 255, 255, 0.88);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Aesthetic Animated Gradient */
            background: linear-gradient(-45deg, #f5f5dc, #fdfaf1, #e0eafc, #fcf3f3);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Visitor Counter Badge */
        .visitor-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--dark-gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid var(--gold);
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 10;
        }

        /* Glass Card */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 90%;
            max-width: 440px;
            padding: 60px 30px 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            animation: cardEntrance 1.2s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .bible-verse {
            font-family: 'Noto Sans Tamil', sans-serif;
            color: #7f8c8d;
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .name {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            color: var(--gold);
            margin: 5px 0;
            text-shadow: 2px 2px 0px rgba(255,255,255,1);
        }

        .turning-one {
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            font-size: 1rem;
            color: #555;
            margin-bottom: 30px;
        }

        /* Countdown Grid */
        #countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 30px 0;
        }

        .time-box {
            background: white;
            padding: 15px 5px;
            border-radius: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.04);
            border: 1px solid #f9f9f9;
        }

        .time-num { display: block; font-size: 1.6rem; font-weight: 700; color: var(--gold); }
        .time-label { font-size: 0.6rem; color: #95a5a6; text-transform: uppercase; font-weight: 600; }

        .details {
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 25px 0;
            margin: 25px 0;
            line-height: 1.8;
        }

        .venue {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.2rem;
            display: block;
            margin-top: 5px;
            color: #222;
        }

        .actions { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            padding: 16px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            transition: 0.4s;
            letter-spacing: 1px;
            display: block;
        }

        .btn-map {
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            color: white;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-rsvp {
            background: white;
            color: var(--gold);
            border: 1.5px solid var(--gold);
        }

        .btn:hover { transform: scale(1.03); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        
        .footer-dots { color: var(--gold); margin-top: 30px; letter-spacing: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="visitor-badge">
            <span id="eye">👁️</span> <span id="count">...</span> views
        </div>

        <div class="bible-verse">
            "கர்த்தர் உனக்கு ஆசிர்வாதம் தந்து,<br>உன்னைப் பாதுகாப்பாராக."<br>
            <strong>— Numbers 6:24</strong>
        </div>

        <div class="name">Jianna</div>
        <div class="turning-one">is turning one</div>

        <div id="countdown">
            <div class="time-box"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
            <div class="time-box"><span class="time-num" id="hours">00</span><span class="time-label">Hrs</span></div>
            <div class="time-box"><span class="time-num" id="minutes">00</span><span class="time-label">Mins</span></div>
            <div class="time-box"><span class="time-num" id="seconds">00</span><span class="time-label">Secs</span></div>
        </div>

        <div class="details">
            <p style="color: var(--dark-gold); font-weight: 700;">FRIDAY, APRIL 24 @ 6:30 PM</p>
            <span class="venue">S.S. CONVENTION HALL</span>
            <p style="font-size: 0.85rem; opacity: 0.8;">Back side of Sri Krishna Sweets, <br>Ponmeni, Madurai - 625016</p>
        </div>

        <div class="actions">
            <a href="http://googleusercontent.com/maps.google.com/4" target="_blank" class="btn btn-map">📍 NAVIGATE TO VENUE</a>
            <a href="https://wa.me/919876543210?text=Excited%20to%20join%20Jianna's%20Birthday!" class="btn btn-rsvp">✉️ RSVP VIA WHATSAPP</a>
        </div>

        <div class="footer-dots">✦ ✦ ✦</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // 1. Visitor Counter Logic
        // We use a simple counter simulation for aesthetics. 
        // For a real production database, you'd use CountAPI or Firebase.
        function updateCounter() {
            let count = localStorage.getItem('jianna_invite_views') || 142; // Starting number
            count = parseInt(count) + 1;
            localStorage.setItem('jianna_invite_views', count);
            document.getElementById('count').innerText = count;
        }
        updateCounter();

        // 2. Beautiful Confetti on Load
        window.onload = function() {
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 2,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#d4af37', '#ffffff']
                });
                confetti({
                    particleCount: 2,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#d4af37', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        };

        // 3. Countdown Logic
        const targetDate = new Date("April 24, 2026 18:30:00").getTime();

        function countdownUpdate() {
            const now = new Date().getTime();
            const gap = targetDate - now;

            const d = Math.floor(gap / (1000 * 60 * 60 * 24));
            const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;

            if (gap < 0) {
                document.getElementById("countdown").innerHTML = "<div style='color:var(--gold); font-weight:700;'>THE CELEBRATION HAS BEGUN!</div>";
            }
        }
        setInterval(countdownUpdate, 1000);
        countdownUpdate();
    </script>
</body>
</html>
