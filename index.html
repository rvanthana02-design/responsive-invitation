<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jianna Turns One</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Fredoka',sans-serif;
  overflow:hidden;
  background:linear-gradient(135deg,#fff0f5,#e0f7fa,#fff9c4);
}

/* Swipe container */
.container{
  display:flex;
  width:200%;
  transition:0.6s;
}
.page{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* Intro */
.intro{
  font-size:30px;
  text-align:center;
  animation:fade 2s;
}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* Card */
.card{
  background:white;
  padding:20px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* Text */
.name{font-size:28px;color:#ff69b4;}
.text{font-size:14px;margin:8px;}
.btn{
  background:#ff80ab;
  color:white;
  padding:10px;
  border:none;
  border-radius:20px;
  margin:5px;
}

/* Cake */
.cake-box{
  position:relative;
  font-size:60px;
}
.cake-slice{
  position:absolute;
  top:0;
  left:0;
  opacity:0;
  transform:translateX(0);
  transition:1s;
}
.cake-box.cut .cake-full{opacity:0.3;}
.cake-box.cut .cake-slice{
  opacity:1;
  transform:translateX(60px);
}

/* Hearts */
.hearts span{
  position:fixed;
  bottom:0;
  animation:float 8s infinite;
}
@keyframes float{100%{transform:translateY(-100vh)}}

/* Balloons */
.balloons span{
  position:fixed;
  bottom:-50px;
  animation:balloon 10s infinite;
}
@keyframes balloon{100%{transform:translateY(-120vh)}}

/* Toys */
.toys span{
  position:fixed;
  bottom:-50px;
  animation:toy 12s infinite;
}
@keyframes toy{100%{transform:translateY(-120vh)}}

/* Sparkle */
.sparkle{
  position:fixed;
  width:100%;
  animation:spark 6s infinite;
}
@keyframes spark{100%{transform:translateY(100vh)}}
</style>
</head>

<body>

<div class="container" id="container">

<!-- PAGE 1 -->
<div class="page">
<div class="intro">
🎉 Welcome 🎉<br>
Baby Jianna Turns ONE 👶💖
</div>
<button onclick="nextPage()" class="btn">Enter 🎈</button>
</div>

<!-- PAGE 2 -->
<div class="page">
<div class="card">

<div style="font-size:40px;">🧸</div>

<div class="name">Jianna 👶💖</div>

<div class="text">
📅 April 24 | ⏰ 6:30 PM
</div>

<div class="text">
📍 Ponmeni, Madurai
</div>

<div class="text">⏳ <span id="countdown"></span></div>

<!-- Cake -->
<div class="cake-box">
  <div class="cake-full">🎂</div>
  <div class="cake-slice">🍰</div>
</div>

<button onclick="cutCake()" class="btn">🎂 Cut Cake</button>

<div>👀 Visitors: <span id="visit"></span></div>

<input id="name" placeholder="Your Name"><br>
<button onclick="rsvp()" class="btn">💌 RSVP</button>

</div>
</div>

</div>

<!-- Effects -->
<div class="hearts"><span>💖</span><span>💕</span></div>
<div class="balloons"><span>🎈</span><span>🎈</span></div>
<div class="toys"><span>🍼</span><span>🧸</span><span>🪀</span></div>
<div class="sparkle">✨✨✨✨</div>

<!-- Sound -->
<audio id="babySound">
<source src="https://www.soundjay.com/human/sounds/baby-laugh-01.mp3">
</audio>

<script>
// Swipe
function nextPage(){
 document.getElementById("container").style.transform="translateX(-100%)";
}

// Countdown
const d=new Date("April 24, 2026 18:30:00").getTime();
setInterval(()=>{
 let t=d-new Date().getTime();
 document.getElementById("countdown").innerHTML=
 Math.floor(t/86400000)+"d "+
 Math.floor(t%86400000/3600000)+"h";
},1000);

// Cake + sound + confetti
function cutCake(){
 document.querySelector('.cake-box').classList.add('cut');
 document.getElementById("babySound").play();

 for(let i=0;i<30;i++){
  let c=document.createElement("div");
  c.innerHTML="🎉";
  c.style.position="fixed";
  c.style.left=Math.random()*100+"vw";
  c.style.top="50%";
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),2000);
 }
}

// Counter
let c=localStorage.getItem("v")||0;
c++; localStorage.setItem("v",c);
document.getElementById("visit").innerText=c;

// RSVP
function rsvp(){
 let name=document.getElementById("name").value;
 if(!name){alert("Enter name"); return;}
 window.open("https://wa.me/91XXXXXXXXXX?text=I am "+name+" joining Jianna birthday 🎉");
}
</script>

</body>
</html>
